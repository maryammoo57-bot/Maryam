<!DOCTYPE html>
<html lang="fa">
<head>

<title>پرسشنامه تشخیص مشکلات مو</title>
<style>
body { font-family: Tahoma, sans-serif; direction: rtl; padding: 20px; background: linear-gradient(180deg,#eefaf5 0%, #ffffff 100%); }
.container { max-width: 700px; margin: 30px auto; background: #fff; padding: 28px; border-radius: 18px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
header { text-align: center; margin-bottom: 10px; }
h2 { color: #1b7a59; margin: 6px 0; font-size: 1.8rem; }
.intro { color: #333; line-height: 1.7; }
.section-title { color: #1b7a59; font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; padding: 8px 14px; background: #eefaf5; border-radius: 10px; border-right: 4px solid #1b7a59; }
.form-row label { display:block; margin:12px 0; }
input[type="text"], input[type="number"], select { width:100%; padding:12px; border-radius:10px; border:1px solid #d7eae2; }
button { background:#1b7a59; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-size:1rem; box-shadow: 0 6px 18px rgba(27,122,89,0.12); transition: transform .12s ease, box-shadow .12s ease; }

.result { margin-top:24px; padding:20px; background:#f1f9f5; border-radius:12px; }
.hair-card { background:#ffffff; padding:14px; border-radius:12px; margin:12px 0; box-shadow: 0 6px 12px rgba(0,0,0,0.04); opacity:0; transform: translateY(8px); }
.hair-card h4 { margin:0 0 8px 0; font-size:1.05rem; color:#0e5b3f; font-family: 'Georgia', serif; }

.hair-card p.warning { background:#fff7f6; border-left:4px solid #ff6b6b; padding:10px; border-radius:6px; }

.type-badge { display:inline-block; padding:10px 14px; border-radius:20px; background:linear-gradient(90deg,#f7fff8,#eaf6f1); border:2px solid #d9efe3; font-weight:700; color:#0b643f; margin-top:8px; font-size:1.05rem; }
.cta-area { margin-top:18px; display:flex; flex-direction:column; gap:12px; }
.cta-grid { display:grid; grid-template-columns: 1fr; gap:12px; }
.cta-card { background: linear-gradient(180deg,#ffffff,#f7fff8); padding:14px; border-radius:12px; box-shadow: 0 8px 20px rgba(13,94,61,0.06); display:flex; align-items:center; gap:12px; border:1px solid #e6f3ec; opacity:0; transform: translateY(8px); }
.cta-card .icon { width:54px; height:54px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:#eaf6f1; flex-shrink:0; }
.cta-card h5 { margin:0; font-size:1rem; color:#0e5b3f; }
.cta-card p { margin:4px 0 0 0; color:#444; font-size:0.95rem; line-height:1.4; }
.cta-actions { display:flex; gap:8px; margin-top:10px; }
.cta-actions a { text-decoration:none; }
.btn-cta-purple { background:#0088cc; color:#fff; padding:10px 14px; border-radius:10px; font-weight:700; border:none; cursor:pointer; }
.btn-cta-green { background:#0088cc; color:#fff; padding:10px 14px; border-radius:10px; font-weight:700; border:none; cursor:pointer; }
.btn-cta-lightblue { background:#5dade2; color:#fff; padding:10px 14px; border-radius:10px; font-weight:700; border:none; cursor:pointer; }
@media(min-width:700px){ .cta-grid { grid-template-columns: repeat(3, 1fr); } }
.small-note { margin-top:12px; color:#555; font-size:0.95rem; text-align:center; }
.progress-wrap { margin-bottom:16px; }
.progress-bar { height:6px; background:#d7eae2; border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#1b7a59,#2ecc71); border-radius:3px; transition:width 0.4s ease; }
.progress-text { font-size:12px; color:#888; margin-bottom:5px; text-align:left; }
@keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
.animate { animation: slideUp .45s cubic-bezier(.2,.9,.2,1) both; }
</style>

<body>
<div class="container">
  <header>
    <h2>🌿 پرسشنامه رایگان تشخیص مشکلات مو</h2>
    <p class="intro">این پرسشنامه به صورت کاملاً رایگان توسط <strong>دکتر مریم موسویان</strong>، پزشک متخصص مراقبت پوست و مو ارائه می‌شود. با پاسخ به چند سوال، مشکل اصلی موهایتان را شناسایی می‌کنیم.</p>
  </header>

  <section id="form-section">
    <div class="section-title">👤 اطلاعات اولیه</div>
    <div class="form-row">
      <label>نام: <input type="text" id="firstName"></label>
      <label>نام خانوادگی: <input type="text" id="lastName"></label>
      <label>شماره موبایل: <input type="text" id="phone"></label>
      <label>جنسیت:
        <select id="gender"><option value="زن">زن</option><option value="مرد">مرد</option></select>
      </label>
      <label>سن: <input type="number" id="age" min="1" max="120"></label>
      <button onclick="startQuiz()">شروع پرسشنامه ←</button>
    </div>
  </section>

  <section id="quiz-section" style="display:none;"></section>
  <section id="result-section" style="display:none;"></section>
</div>

<script>
/*
الگوریتم علمی بر اساس:
- HAIR-Q Questionnaire (Klassen et al., Journal of Cosmetic Dermatology, 2024)
- ALTO Questionnaire (Alopecia Areata Assessment Tool, PMC 2018)
- Telogen Effluvium diagnostic criteria (dermatology guidelines)
- Androgenetic Alopecia BASP Classification (2024)
- Seborrheic Dermatitis SSD International Study (PMC 2024)
- Adherent Scalp Flaking Score (ASFS) criteria
*/

const sections = ['ریزش مو', 'ریزش مو', 'ریزش مو', 'ریزش مو', 'پوست سر و شوره', 'پوست سر و شوره', 'پوست سر و شوره', 'وضعیت کلی مو', 'وضعیت کلی مو'];

const quizQuestions = [
  {
    section: 'بخش اول: ریزش مو',
    q: 'میزان ریزش موت رو چطور توصیف می‌کنی؟',

    ]
  },
  {

    q: 'ریزش موت از کِی شروع شده؟',
    a: [
      'کمتر از ۳ ماه',
      '۳ تا ۶ ماه',

      'بیشتر از یک سال — تدریجی بوده',
      'همیشه موهام کم‌پشت بوده'
    ]
  },
  {
    section: 'بخش اول: ریزش مو',

    a: [

    ]
  },
  {

    q: 'پوست سرت رو چطور توصیف می‌کنی؟',
    a: [
      'چرب و براق — موهام خیلی زود کثیف میشه',
      'خشک و کشیده — گاهی می‌سوزه',
      'شوره سفید و پودری دارم — پخش میشه',
      'شوره زرد و چرب دارم — می‌چسبه به سر',
      'نرمال — مشکلی ندارم'
    ]
  },
  {
    section: 'بخش دوم: پوست سر و شوره',
    q: 'شوره‌ات با کدوم علائم همراهه؟',
    a: [
      'فقط پوسته سفید — بدون خارش',
      'خارش شدید',
      'قرمزی و التهاب پوست سر',
      'پوسته زرد چرب + قرمزی با هم',
      'شوره ندارم'
    ]
  },
  {
    section: 'بخش دوم: پوست سر و شوره',
    q: 'شوره یا خارش پوست سرت چه وقتی بدتر میشه؟',

      'در فصل سرد و هوای خشک',

    ]
  },
  {

    a: [
      'خیلی خشک، وز و الکتریکی میشه',
      'نرم و طبیعی',
      'بعد از چند ساعت چرب میشه',
      'شکننده — موقع شانه زدن پاره میشه',
      'بی‌روح، کدر و بی‌جان'
    ]
  },
  {
    section: 'بخش سوم: وضعیت کلی مو',
    q: 'الان از چه محصولی برای مو استفاده می‌کنی؟',
    a: [
      'شامپو معمولی سوپرمارکت',
      'شامپو تخصصی ضدریزش یا ضدشوره',
      'علاوه بر شامپو، سرم یا لوسیون هم دارم',
      'هیچ محصول خاصی ندارم',
      'چند محصول امتحان کردم ولی جواب نداده'

];

/*
سیستم امتیازدهی:
- fall: ریزش (هر چه بیشتر = ریزش شدیدتر)
- andro: آندروژنتیک (ژنتیکی)
- telogen: تلوژن افلوویوم (موقتی)
- areata: آلوپسی آره‌آتا
- dandruff_dry: شوره خشک
- dandruff_seb: درماتیت سبوره (شوره چرب)
- damage: آسیب‌دیدگی مو
*/
const scoring = [
  // سوال 1: میزان ریزش
  [{fall:2,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:2,andro:0,telogen:0,areata:3,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:2,andro:3,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 2: مدت ریزش
  [{fall:1,andro:0,telogen:2,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:0,telogen:2,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:1,telogen:1,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:2,andro:2,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:2,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 3: عوامل تریگر
  [{fall:1,andro:0,telogen:3,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:0,telogen:3,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:0,telogen:3,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:0,telogen:2,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:1,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 4: سابقه خانوادگی
  [{fall:1,andro:3,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:3,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:3,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:1,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 5: پوست سر
  [{fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:2,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:2,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:2,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:3,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 6: علائم شوره
  [{fall:0,andro:0,telogen:0,areata:0,dandruff_dry:2,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:1,dandruff_seb:1,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:2,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:3,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 7: زمان بدتر شدن شوره
  [{fall:0,andro:0,telogen:0,areata:0,dandruff_dry:2,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:2,damage:0},
   {fall:0,andro:0,telogen:1,areata:0,dandruff_dry:1,dandruff_seb:1,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:1,dandruff_seb:1,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0}],
  // سوال 8: وضعیت مو بعد از شستشو
  [{fall:0,andro:0,telogen:0,areata:0,dandruff_dry:1,dandruff_seb:0,damage:2},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:2,damage:0},
   {fall:1,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:3},
   {fall:1,andro:0,telogen:1,areata:0,dandruff_dry:0,dandruff_seb:0,damage:1}],
  // سوال 9: محصولات فعلی
  [{fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0},
   {fall:1,andro:0,telogen:0,areata:0,dandruff_dry:1,dandruff_seb:1,damage:1}]
];

let userAnswers = [], currentQuestion = 0;
let lastSection = '';

function startQuiz(){
  const firstName=document.getElementById('firstName').value.trim();
  const lastName=document.getElementById('lastName').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const age=document.getElementById('age').value;
  if(!firstName||!lastName||!phone||!age){alert('لطفا همه اطلاعات را وارد کنید');return;}
  document.getElementById('form-section').style.display='none';
  showQuestion();
}

function showQuestion(){
  if(currentQuestion>=quizQuestions.length){showResult();return;}
  const q=quizQuestions[currentQuestion];
  const total=quizQuestions.length;
  const pct=Math.round(((currentQuestion+1)/total)*100);

  let sectionBadge='';
  if(q.section!==lastSection){
    sectionBadge=`<div class="section-badge">${q.section}</div>`;
    lastSection=q.section;
  }

  let html=`<div class="progress-wrap">
    <div class="progress-text">سوال ${currentQuestion+1} از ${total}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="question">
    ${sectionBadge}
    <h3>${q.q}</h3>`;
  q.a.forEach((ans,i)=>{html+=`<label class='option'><input type='radio' name='q${currentQuestion}' value='${i}'> ${ans}</label>`;});
  html+=`<div style="margin-top:14px;display:flex;gap:10px;">`;
  if(currentQuestion>0) html+=`<button onclick='prevQuestion()' style="background:#888">← قبلی</button>`;
  html+=`<button onclick='nextQuestion()'>بعدی ←</button></div></div>`;
  document.getElementById('quiz-section').innerHTML=html;
  document.getElementById('quiz-section').style.display='block';

  if(userAnswers[currentQuestion]!==undefined){
    const r=document.querySelector(`input[name='q${currentQuestion}'][value='${userAnswers[currentQuestion]}']`);
    if(r)r.checked=true;
  }
}

function prevQuestion(){
  if(currentQuestion>0){currentQuestion--;showQuestion();}
}

function nextQuestion(){
  const radios=document.getElementsByName('q'+currentQuestion);
  let selected=null;
  radios.forEach(r=>{if(r.checked)selected=parseInt(r.value);});
  if(selected===null){alert('لطفا یک گزینه انتخاب کنید');return;}
  userAnswers[currentQuestion]=selected;
  currentQuestion++;
  showQuestion();
}

function showResult(){
  document.getElementById('quiz-section').style.display='none';

  let scores={fall:0,andro:0,telogen:0,areata:0,dandruff_dry:0,dandruff_seb:0,damage:0};
  userAnswers.forEach((ansIdx,qi)=>{
    const s=scoring[qi][ansIdx]||{};
    Object.keys(scores).forEach(k=>{scores[k]+=(s[k]||0);});
  });

  // تشخیص مشکلات
  const hasHairLoss=scores.fall>=2;
  const isAndrogenic=scores.andro>=4;
  const isTelogen=scores.telogen>=4;
  const isAreata=scores.areata>=3;
  const hasDandruffDry=scores.dandruff_dry>=3;
  const hasDandruffSeb=scores.dandruff_seb>=4;
  const hasDamage=scores.damage>=3;

  // ساخت لیست مشکلات
  let problems=[];
  let resultCards='';
  let badgeText='';

  if(isAreata){
    problems.push('آلوپسی آره‌آتا (احتمالی)');
    resultCards+=`<div class='hair-card'>
      <h4>⚠️ احتمال آلوپسی آره‌آتا</h4>
      <p>بر اساس پاسخ‌های شما، الگوی ریزش موتون با آلوپسی آره‌آتا مطابقت دارد — ریزش سکه‌ای شکل در نواحی خاص. این یک بیماری خودایمنی است که سیستم ایمنی بدن به فولیکول‌های مویی حمله می‌کند.</p>
